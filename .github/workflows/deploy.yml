name: Publicar en GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'   # Solo se activa si hay cambios en la carpeta client/

  # Permite ejecutar manualmente desde la pestaña Actions en GitHub
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Solo permite un despliegue a la vez
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir carpeta client/ como artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: './client'   # Solo sube el contenido de client/, no todo el repo

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
